name: Pre-Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.version.outputs.semver }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.100'

      - name: Resolve prerelease tag
        id: version
        shell: bash
        run: |
          dotnet tool install -g nbgv
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
          VERSION_FULL=$(nbgv get-version -v SemVer2)
          VERSION_NO_META=${VERSION_FULL%%+*}
          TAG="v${VERSION_NO_META}-beta.${GITHUB_RUN_NUMBER}"
          echo "semver=${VERSION_NO_META}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

  build-maccatalyst:
    name: Build macOS (Mac Catalyst)
    runs-on: macos-15
    needs: version
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.100'

      - name: Install .NET MAUI workloads
        run: dotnet workload install maui-maccatalyst maui-ios --skip-manifest-update

      - name: Restore dependencies
        run: dotnet restore Finanzuebersicht/Finanzuebersicht.csproj

      - name: Build Mac Catalyst (unsigned)
        run: |
          cd Finanzuebersicht
          dotnet build -f net10.0-maccatalyst \
            -c Debug \
            -p:ValidateXcodeVersion=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:MtouchLink=SdkOnly \
            -p:UseInterpreter=true \
            -p:EnableILLink=false

      - name: Pack macOS artifact
        shell: bash
        run: |
          cd Finanzuebersicht/bin/Debug
          zip -r "../../Finanzuebersicht-${{ needs.version.outputs.tag }}-maccatalyst.zip" net10.0-maccatalyst

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: prerelease-maccatalyst
          path: Finanzuebersicht/Finanzuebersicht-${{ needs.version.outputs.tag }}-maccatalyst.zip
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: version
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.100'

      - name: Install .NET MAUI workloads
        run: dotnet workload install maui-windows maui-ios maui-maccatalyst --skip-manifest-update

      - name: Restore dependencies
        run: dotnet restore Finanzuebersicht/Finanzuebersicht.csproj

      - name: Build Windows
        run: |
          cd Finanzuebersicht
          dotnet build -f net10.0-windows10.0.19041.0 -c Release

      - name: Pack Windows artifact
        shell: pwsh
        run: |
          Compress-Archive -Path "Finanzuebersicht/bin/Release/net10.0-windows10.0.19041.0/*" -DestinationPath "Finanzuebersicht/Finanzuebersicht-${{ needs.version.outputs.tag }}-windows.zip" -Force

      - name: Upload Windows package
        uses: actions/upload-artifact@v4
        with:
          name: prerelease-windows
          path: Finanzuebersicht/Finanzuebersicht-${{ needs.version.outputs.tag }}-windows.zip
          if-no-files-found: error
          retention-days: 14

  publish-prerelease:
    name: Publish GitHub Pre-Release
    runs-on: ubuntu-latest
    needs: [version, build-maccatalyst, build-windows]
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Create or update pre-release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.version.outputs.tag }}
          name: Pre-Release ${{ needs.version.outputs.tag }}
          prerelease: true
          generateReleaseNotes: true
          allowUpdates: true
          removeArtifacts: true
          artifacts: "dist/**/*.zip"