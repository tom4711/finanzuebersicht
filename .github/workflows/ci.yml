name: CI

on:
  push:
    branches: [ main, "release/v*" ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: Tests (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for Nerdbank.GitVersioning

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.100'

      - name: Run tests
        run: dotnet test Finanzuebersicht.Tests --configuration Release --logger "console;verbosity=minimal"

  mutation-test:
    name: Mutation Tests (Stryker)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.100'
      - name: Restore dependencies
        run: dotnet restore Finanzuebersicht.Core/Finanzuebersicht.Core.csproj
      - name: Install Stryker
        run: dotnet tool install -g dotnet-stryker
      - name: Run Stryker mutation tests
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          cd Finanzuebersicht.Core
          dotnet build -c Debug
          dotnet-stryker --test-project ../Finanzuebersicht.Tests/Finanzuebersicht.Tests.csproj --log-to-file

  build:
    name: Build (Mac Catalyst)
    runs-on: macos-15
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for Nerdbank.GitVersioning

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.100'

      - name: Install .NET MAUI workloads
        run: dotnet workload install maui-ios maui-maccatalyst --skip-manifest-update

      - name: Restore dependencies
        run: dotnet restore Finanzuebersicht/Finanzuebersicht.csproj

      - name: Get version
        id: version
        run: |
          dotnet tool install -g nbgv
          echo "VERSION=$(nbgv get-version -v SemVer2)" >> $GITHUB_OUTPUT

      - name: Build Mac Catalyst (unsigned)
        run: |
          cd Finanzuebersicht
          dotnet build -f net10.0-maccatalyst \
            -c Debug \
            -p:ValidateXcodeVersion=false \
            -p:CodesignKey="" \
            -p:CodesignProvision="" \
            -p:MtouchLink=SdkOnly \
            -p:UseInterpreter=true \
            -p:EnableILLink=false

      - name: Upload Mac Catalyst artifact
        uses: actions/upload-artifact@v4
        with:
          name: Finanzuebersicht-${{ steps.version.outputs.VERSION }}-maccatalyst
          path: Finanzuebersicht/bin/Debug/net10.0-maccatalyst/**
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: test
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.100'

      - name: Install .NET MAUI workloads
        run: dotnet workload install maui-windows maui-ios maui-maccatalyst --skip-manifest-update

      - name: Restore dependencies
        run: dotnet restore Finanzuebersicht/Finanzuebersicht.csproj

      - name: Get version
        id: version
        run: |
          dotnet tool install -g nbgv
          echo "VERSION=$(nbgv get-version -v SemVer2)" >> $env:GITHUB_OUTPUT

      - name: Build Windows
        run: |
          cd Finanzuebersicht
          dotnet build -f net10.0-windows10.0.19041.0 -c Release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Finanzuebersicht-${{ steps.version.outputs.VERSION }}-windows
          path: Finanzuebersicht/bin/Release/net10.0-windows10.0.19041.0/**
          if-no-files-found: error
          retention-days: 14
